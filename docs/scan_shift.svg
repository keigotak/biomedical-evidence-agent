350.0" cy="796.0" r="7" fill="none" stroke="#fcfcfb" stroke-width="2"/><rect x="16" y="822" width="868" height="1" fill="#e6e4dd"/><circle cx="26" cy="844" r="4.5" fill="#d03b3b"/><text x="38" y="848" font-size="12.5" fill="#0b0b0b"><tspan font-weight="700">Three dangerous misses.</tspan> The deterministic rules grade <tspan font-weight="600">beta-carotene → lung cancer</tspan>, <tspan font-weight="600">vitamin C → colds</tspan>, and</text><text x="38" y="866" font-size="12.5" fill="#0b0b0b"><tspan font-weight="600">arthroscopic knee surgery → beats placebo</tspan> as well-supported. Claude reads the abstracts and contradicts all three.</text><circle cx="30" cy="896" r="6" fill="#fcfcfb" stroke="#6b6b66" stroke-width="2.5"/><text x="42" y="900" font-size="12" fill="#0b0b0b">Deterministic (offline rules)</text><circle cx="240" cy="896" r="7" fill="#6b6b66"/><circle cx="240" cy="896" r="7" fill="none" stroke="#fcfcfb" stroke-width="2"/><text x="252" y="900" font-size="12" fill="#0b0b0b">Claude extractor</text><text x="828" y="900" font-size="11" fill="#6b6b66" text-anchor="end" font-style="italic">snapshot of scripts/pubmed_scan.py · live PubMed · claude-opus-4-8</text></svg>